<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
body {
  background-color: #4DD0E1;
}

.cards_wrapper {
  font-family: "Roboto", sans-serif;
}

.card {
  width: 100%;
  margin: 0 auto 5px;
  cursor: pointer;
}
.card .card_description {
  border-radius: 5px;
  height: 400px;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  transition: border-radius 0.6s ease-in-out;
  box-shadow: 0px 1px 5px rgba(0, 0, 0, 0.2);
}
.card .card_description .date,
.card .card_description .title {
  color: rgba(255, 255, 255, 0.8);
  font-size: 50px;
}
.card .card_description .date {
  margin: 0 80px 0 20px;
}
.card.today .card_description {
  background-color: #ffb300;
}
.card.tomorrow .card_description {
  background-color: #EF6C00;
}

.card.unfolded .top {
  animation: unfold_top 0.6s ease-in-out;
}
.card.unfolded .bottom {
  animation: unfold_bottom 0.6s ease-in-out;
}
.card.unfolded .card_description {
  border-radius: 5px 5px 0 0;
}

.card.folded .top {
  animation: fold_top 0.6s forwards ease-in-out;
}
.card.folded .bottom {
  animation: fold_bottom 0.6s forwards ease-in-out;
}

.top,
.bottom {
  position: relative;
  overflow: hidden;
  height: 80px;
  background-color: #fff;
  box-shadow: 0px 1px 5px rgba(0, 0, 0, 0.2);
}

.bottom {
  border-radius: 0 0 5px 5px;
}

.alarm_item {
  display: flex;
  align-items: center;
}
.alarm_item .time_block {
  margin-left: 20px;
}
.alarm_item .day_part {
  font-size: 20px;
  margin: 0 25px 0 5px;
  color: #798384;
}
.alarm_item .time {
  padding: 10px;
  border-radius: 3px;
  color: #fff;
  background-color: #03a9f4;
}
.alarm_item .alarm_item_description {
  color: #798384;
}

@keyframes fold_top {
  100% {
    transform-origin: top;
    transform: perspective(100px) rotateX(-10deg);
    height: 0;
  }
}
@keyframes fold_bottom {
  100% {
    transform-origin: bottom;
    transform: perspective(100px) rotateX(10deg);
    height: 0;
  }
}
@keyframes unfold_top {
  0% {
    transform-origin: top;
    height: 0;
    transform: perspective(100px) rotateX(-10deg);
  }
  100% {
    transform: perspective(100px) rotateX(0deg);
    height: 80px;
  }
}
@keyframes unfold_bottom {
  0% {
    transform-origin: bottom;
    height: 0;
    transform: perspective(100px) rotateX(10deg);
  }
  100% {
    transform: perspective(100px) rotateX(0deg);
    height: 80px;
  }
}
</style>
<link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
</head>
<body translate="no">

<div class="cards_wrapper">
<div class="card unfolded today">
<div class="card_description">
<div class="date"></div>
<div class="title">Adobe Photoshop</div>
<img src=""/>
</div>
<div class="alarm_item top">
<div class="time_block">
<div class="time">2024-01-02</div>
</div>
<div class="day_part">安装版</div>
<div class="alarm_item_description">CC2023直链下载</div>
</div>
<div class="alarm_item bottom">
<div class="time_block">
<div class="time">2024-01-02</div>
</div>
<div class="day_part">安装版</div>
<div class="alarm_item_description"><a href="#">CS6直链下载</a></div>
</div>
</div>

<script type="text/javascript" src="http://repo.bfw.wiki/bfwrepo/js/jquery-3.2.1.min.js"></script>
<script>
$('.card').on('click', function (e) {
  $(this).toggleClass('folded unfolded');
});

    </script>

</body>
</html>
