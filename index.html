<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">

		<title>Lande Core</title>

<link rel="stylesheet" href="fonts/fonts.css">
		<style>
			body{zoom:1.2}
			      @import url("https://fonts.googleapis.com/css?family=Lato:300,400|Poppins:300,400,800&display=swap");
			* {
			  margin: 0px;
			  padding: 0;
			}
			
			body {
			  font-family: 'Poppins';
			  overflow: hidden;
			}
			
			.container {
			  width: 100%;
			  height: 100vh;
			  background-color: #35fff9;
			  display: flex;
			  justify-content: center;
			  align-items: center;
			}
			.container .post {
			  width: 380px;
			  height: 780px;
			  display: flex;
			  flex-direction: column;
			  position: relative;
			}
			.container .post:hover .header_post {
			  margin-top: -20px;
			}
			.container .post:hover .body_post {
			  height: 50%;
			}
			.container .post .header_post {
			  width: 100%;
			  height: 40%;
			  background: #35fff9;
			  position: absolute;
			  top: 0;
			  -webkit-transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  -moz-transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  -ms-transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  -o-transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			}
			.container .post .header_post img {
			  max-width: 100%;
			  height: auto;
			}
			.container .post .body_post {
			  width: 100%;
			  height: 60%;
			  background: #fff;
			  position: absolute;
			  bottom: 0;
			  display: flex;
			  justify-content: center;
			  align-items: center;
			  -webkit-transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  -moz-transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  -ms-transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  -o-transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  cursor: pointer;
			}
			.container .post .body_post .post_content {
			  width: 80%;
			  height: 80%;
			  background: #fff;
			  position: relative;
			}
			.container .post .body_post .post_content h1 {
			  font-size: 20px;
			  font-weight: bold;
			}
			.container .post .body_post .post_content p {
			  font-size: 14px;
			  font-weight: normal;
			}
			.container .post .body_post .post_content .container_infos {
			  width: 100%;
			  display: flex;
			  justify-content: space-between;
			  position: absolute;
			  bottom: 0;
			  border-top: 1px solid rgba(0, 0, 204, 0.2);
			  padding-top: 25px;
			}
			.container .post .body_post .post_content .container_infos .postedBy {
			  display: flex;
			  flex-direction: column;
			  text-transform: uppercase;
			  letter-spacing: 1px;
			  font-size: 12px;
			}
			.container .post .body_post .post_content .container_infos .postedBy span {
			  font-size: 12px;
			  text-transform: uppercase;
			  opacity: 0.5;
			  letter-spacing: 1px;
			  font-weight: bold;
			}
			.container .post .body_post .post_content .container_infos .container_tags {
			  display: flex;
			  flex-direction: column;
			}
			.container .post .body_post .post_content .container_infos .container_tags span {
			  font-size: 12px;
			  text-transform: uppercase;
			  opacity: 0.5;
			  letter-spacing: 1px;
			  font-weight: bold;
			}
			.container .post .body_post .post_content .container_infos .container_tags .tags ul {
			  display: flex;
			}
			.container .post .body_post .post_content .container_infos .container_tags .tags ul li {
			  font-size: 12px;
			  letter-spacing: 2px;
			  list-style: none;
			  margin-left: 8px;
			  text-transform: uppercase;
			  position: relative;
			  z-index: 1;
			  display: flex;
			  justify-content: center;
			  cursor: pointer;
			}
			.container .post .body_post .post_content .container_infos .container_tags .tags ul li:first-child {
			  margin-left: 0px;
			}
			.container .post .body_post .post_content .container_infos .container_tags .tags ul li:before {
			  content: '';
			  text-align: center;
			  width: 100%;
			  height: 5px;
			  background: #fc22df;
			  opacity: 0.5;
			  position: absolute;
			  bottom: 0;
			  z-index: -1;
			  padding: 0px 1px;
			  -webkit-transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  -moz-transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  -ms-transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  -o-transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			  transition: cubic-bezier(0.68, -0.55, 0.27, 1.55) 320ms;
			}
			.container .post .body_post .post_content .container_infos .container_tags .tags ul li:hover:before {
			  height: 18px;
			}
			
			footer {
			  width: 350px;
			  height: 80px;
			  background: #17A16F;
			  position: absolute;
			  right: 0;
			  bottom: -80px;
			  display: flex;
			  justify-content: center;
			  align-items: center;
			  animation: top 0.8s forwards;
			}
			footer span {
			  display: flex;
			  align-items: center;
			  justify-content: center;
			  font-size: 12px;
			  color: #fff;
			  font-family: 'Poppins';
			}
			footer span i {
			  margin-right: 25px;
			  font-size: 22px;
			  color: #fff;
			  animation: icon 2s forwards;
			  opacity: 0;
			}
			
			@keyframes top {
			  0% {
			    opacity: 0;
			    bottom: -80px;
			  }
			  100% {
			    opacity: 1;
			    bottom: 0px;
			  }
			}
			@keyframes icon {
			  0% {
			    opacity: 0;
			    transform: scale(0);
			  }
			  50% {
			    opacity: 1;
			    transform: scale(1.3) rotate(-2deg);
			  }
			  100% {
			    opacity: 1;
			    bottom: 0px;
			  }
			}
			
			.button {
			  -webkit-appearance: none;
			     -moz-appearance: none;
			          appearance: none;
			  background: transparent;
			  border: 0;
			  color: #fff;
			  cursor: pointer;
			  font: inherit;
			  font-weight: 100;
			  line-height: 0;
			  padding: 1em 1.5em;
			  position: relative;
			  transition: filter var(--button-motion-duration) var(--button-motion-ease);
			  -webkit-user-select: none;
			     -moz-user-select: none;
			      -ms-user-select: none;
			          user-select: none;
			}
			
			.button:hover {
			  filter: brightness(1);
			}
			
			.button:active {
			  filter: brightness(0.9);
			}
			
			.button__content {
			  display: block;
			  position: relative;
			  transition: transform var(--button-motion-duration) var(--button-motion-ease);
			}
			
			.button:hover .button__content {
			  transform: scale(var(--button-scale-up));
			}
			
			.button:active .button__content {
			  transform: scale(var(--button-scale-down));
			}
			
			.button__shape {
			  fill: #2134de;
			  position: absolute;
			  inset: 0;
			  inline-size: 100%;
			  block-size: 100%;
			  overflow: visible;
			  transition: transform var(--button-motion-duration) var(--button-motion-ease);
			}
			
			@supports not (d: path('')) {
			  .button:hover .button__shape {
			    transform: scale(var(--button-scale-up));
			  }
			
			  .button:active .button__shape {
			    transform: scale(var(--button-scale-down));
			  }
			}
			
			.button__path {
			  transition: d var(--button-motion-duration) var(--button-motion-ease);
			}
			
			.button:hover .button__path {
			  d: path("M0,0 C0,-5 100,-5 100,0 C105,0 105,100 100,100 C100,105 0,105 0,100 C-5,100 -5,0 0,0 z");
			}
			
			.button:active .button__path {
			  d: path("M0,0 C30,10 70,10 100,0 C95,30 95,70 100,100 C70,90 30,90 0,100 C5,70 5,30 0,0 z");
			} 

		</style>

	</head>
	<body translate="no">
		<div class="container">
			<div class="post">
				<div class="header_post">
					<img src="http://ys-g.ysepan.com/617122834/218389907/n74386L466JLKLlwfooUf8/space.jpg" alt="Sky">
					
					<input type="text" value="3094839098" id="copy" style="opacity: 0" readonly>
					    <br>
					<div align="center">
						<button class="button" data-copytarget="#copy" style="font-family:Zhankulogo;font-size:30px;">Copy My QQ</button>
					</div>
					
				<script>
					    (function name(params) {
					        'use strict';
					
					        document.body.addEventListener('click', copy, true);
					
					        function copy(e) {
					            var
					                t = e.target,
					                c = t.dataset.copytarget,
					                inp = (c ? document.querySelector(c) : null);
					            if (inp && inp.select) {
					                inp.select();
					
					                try {
					                    document.execCommand('copy');
					                } catch (error) {
					                    alert('请使用Ctrl+c进行复制');
					                }
					            }
					        }
					    })();
				</script>
					
				</div>
				<div class="body_post">
					<div class="post_content">
						<h1 style="font-family:ChillR;">Lande Space</h1>
						<p style="font-family:Vonbit;font-size:16px;">于231218开始开放...
						<p style="font-family:Vonbit;font-size:16px;color:red;">
							<br>核心主页正在建设中...请等待...
						</p>

						<p style="font-family:Vonbit;font-size:16px;color:blue;">
							<br>“Nice To Meet You.”	
						</p>
						
<p style="font-family:Vonbit;font-size:16px;color:skyblue;">
							<br>唯一主站：<a href="https://landesr.icu/">Landesr.icu</a>
							
							</p>
						
							<div class="container_infos">
							<div class="postedBy">
								<span>Link</span>
								landesr.icu
							</div>
							
							<div class="container_tags">
								<span>By</span>
								<div class="tags">
									<ul>
										<li>Lande</li>
									</ul>
								</div>
							</div>
							
						</div>
					</div>
				</div>
			</div>
		</div>

	</body>
</html>
